{% extends "base.html" %}

{% block content %}

<h1>資料分析</h1>

<div class="row">

    <div class="col-md-6">
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">
                各縣市景點數量
            </div>

            <div class="card-body">
                <table class="table table-bordered table-hover">
                    <thead class="table-primary">
                        <tr>
                            <th>縣市</th>
                            <th>景點數量</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for row in city_data %}
                        <tr>
                            <td>{{ row[0] }}</td>
                            <td>{{ row[1] }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-success text-white">
                景點類型數量
            </div>

            <div class="card-body">
                <table class="table table-bordered table-hover">
                    <thead class="table-success">
                        <tr>
                            <th>類型</th>
                            <th>數量</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for row in category_data %}
                        <tr>
                            <td>{{ row[0] }}</td>
                            <td>{{ row[1] }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<hr>

<div class="card shadow-sm mb-4">
    <div class="card-header bg-primary text-white">
        各縣市景點數量長條圖
    </div>

    <div class="card-body">
        <canvas id="cityChart"></canvas>
    </div>
</div>

<div class="card shadow-sm mb-4">
    <div class="card-header bg-success text-white">
        景點類型圓餅圖
    </div>

    <div class="card-body">
        <canvas id="categoryChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const cityData = {{ city_data | tojson }};
    const categoryData = {{ category_data | tojson }};

    const cityLabels = cityData.map(item => item[0]);
    const cityCounts = cityData.map(item => item[1]);

    const categoryLabels = categoryData.map(item => item[0]);
    const categoryCounts = categoryData.map(item => item[1]);

    new Chart(document.getElementById("cityChart"), {
        type: "bar",
        data: {
            labels: cityLabels,
            datasets: [{
                label: "景點數量",
                data: cityCounts
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    new Chart(document.getElementById("categoryChart"), {
        type: "pie",
        data: {
            labels: categoryLabels,
            datasets: [{
                label: "景點類型",
                data: categoryCounts
            }]
        },
        options: {
            responsive: true
        }
    });
</script>

{% endblock %}
