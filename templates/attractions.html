{% extends "base.html" %}

{% block content %}

<h1>景點資料查詢</h1>

<form action="/attractions" method="get" class="d-flex mb-4">

    <input
        type="text"
        name="keyword"
        class="form-control search-box me-2"
        placeholder="輸入景點、縣市或類型"
        value="{{ keyword }}">

    <button type="submit" class="btn btn-primary">
        搜尋
    </button>

    <a href="/attractions" class="btn btn-secondary ms-2">
        清除
    </a>

</form>

<div class="card shadow-sm">

    <div class="card-body">

        <table class="table table-hover table-bordered align-middle">

            <thead class="table-primary">
                <tr>
                    <th>景點名稱</th>
                    <th>縣市</th>
                    <th>類型</th>
                    <th>搜尋資料</th>
                </tr>
            </thead>

            <tbody>

                {% for row in attractions %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>
                        <a href="https://www.google.com/search?q={{ row[0] }} {{ row[1] }} 景點"
                           target="_blank"
                           class="btn btn-sm btn-outline-success">
                            Google搜尋
                        </a>
                    </td>
                </tr>
                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
